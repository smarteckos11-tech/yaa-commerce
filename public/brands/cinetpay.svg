<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" fill="none">
  <!-- CinetPay official-style logo: blue gradient badge + wordmark -->
  <defs>
    <linearGradient id="cp-blue" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B4D8C"/>
      <stop offset="1" stop-color="#0F2D5C"/>
    </linearGradient>
  </defs>
  <!-- Square badge -->
  <rect x="4" y="14" width="52" height="52" rx="10" fill="url(#cp-blue)"/>
  <!-- "C" letterform -->
  <path d="M40 28 Q28 24 22 32 Q16 40 22 50 Q28 56 40 52" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Wordmark -->
  <text x="68" y="42" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#1B4D8C">Cinet</text>
  <text x="125" y="42" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#00A859">Pay</text>
  <text x="68" y="62" font-family="Arial, sans-serif" font-weight="500" font-size="11" fill="#64748B">Paiement en ligne</text>
</svg>
