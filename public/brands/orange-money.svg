<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" fill="none">
  <!-- Orange Money official-style logo: orange square + wordmark -->
  <defs>
    <linearGradient id="om-orange" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF7900"/>
      <stop offset="1" stop-color="#FF5500"/>
    </linearGradient>
  </defs>
  <!-- Square logo -->
  <rect x="4" y="14" width="52" height="52" rx="10" fill="url(#om-orange)"/>
  <!-- "OM" letterform (stylized) -->
  <text x="30" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="28" fill="white">OM</text>
  <!-- Wordmark -->
  <text x="68" y="42" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#FF7900">Orange</text>
  <text x="68" y="62" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="#000000">Money</text>
</svg>
